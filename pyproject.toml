[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "adk: end-to-end ADK evalset tests (require a live model + GCP credentials)",
]

[tool.ruff]
target-version = "py311"
line-length = 100
extend-exclude = ["trading_assistant/user_database/outputs"]

[tool.ruff.lint]
# Keep CI focused on real defects (syntax errors, undefined names, broken
# f-strings) rather than stylistic churn on this prototype codebase.
select = ["E9", "F63", "F7", "F82"]
